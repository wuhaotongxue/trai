# ============================================
# Prometheus 配置
# ============================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # ====================
  # Trai Backend API
  # ====================
  - job_name: 'trai-backend'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['backend:5666']
        labels:
          service: 'trai-backend'
          environment: 'production'

  # ====================
  # PostgreSQL Exporter (可选)
  # ====================
  - job_name: 'postgres-exporter'
    scrape_interval: 30s
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          service: 'postgresql'

  # ====================
  # Redis Exporter (可选)
  # ====================
  - job_name: 'redis-exporter'
    scrape_interval: 15s
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service: 'redis'

  # ====================
  # Prometheus 自身监控
  # ====================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
