<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="./kity.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TRAI</title>
    <!-- 使用明亮背景，符合 Win11 亮色主题 -->
    <style>
      body {
        margin: 0;
        background-color: #f3f3f3; /* Win11 Fluent Light 基础色 */
        color: #202020;
        font-family: 'Segoe UI Variable', 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
        overflow: hidden; /* 防止出现外层滚动条 */
      }
      /* 可拖拽区域通用类 */
      .drag-region {
        -webkit-app-region: drag;
      }
      .no-drag-region {
        -webkit-app-region: no-drag;
      }
      
      /* 全局旋转动画 */
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      .animate-spin {
        animation: spin 1s linear infinite;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      console.log('HTML loaded')
      console.log('Root element:', document.getElementById('root'))
    </script>
    <script type="module" src="/src/renderer/main.tsx"></script>
  </body>
</html>
